<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lumi's Magic Resonance — ルミの魔法バトル</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Zen+Maru+Gothic:wght@500;700;900&family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#3a2558; --bg2:#2a1845; --bg3:#150d28;
  --purple:#9060c0; --purple-light:#c8a0e0; --purple-pale:#ede0f8; --purple-dark:#4a3870;
  --gold:#c9a030; --gold-light:#f0d060; --gold-pale:#f8f0c0;
  --cream:#faf4e8; --text-dark:#1e1235; --text-soft:#3a2558;
  --green:#4a9040; --red:#c83030; --sky:#4890d0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;overscroll-behavior:none;}
body{font-family:'Fredoka','Kosugi Maru','Zen Maru Gothic',sans-serif;background:#150d28;color:var(--text-dark);user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;}
.stage-wrap{position:relative;width:100%;height:100%;max-width:560px;max-height:1000px;background:radial-gradient(ellipse 95% 55% at 50% 0%,#4a2d70 0%,var(--bg2) 48%,var(--bg3) 100%);overflow:hidden;}
@media(min-width:600px) and (min-height:740px){
  body{background:radial-gradient(circle at 50% 30%,#241640,#0c0718);}
  .stage-wrap{border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 2px rgba(144,96,192,.35),inset 0 0 0 6px rgba(21,13,40,.8);height:94%;}
}
.starfield{position:absolute;inset:0;pointer-events:none;z-index:0;}
.starfield span{position:absolute;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);font-size:var(--sz,1rem);color:var(--col,#fde68a);text-shadow:0 0 6px var(--col,#fde68a);line-height:1;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.3) rotate(0)}50%{opacity:.9;transform:scale(1) rotate(20deg)}}
.screen{position:absolute;inset:0;z-index:2;display:none;flex-direction:column;align-items:center;padding:clamp(16px,4vw,28px);overflow-y:auto;}
.screen.active{display:flex;}
.btn{font-family:'Fredoka','Kosugi Maru',sans-serif;font-weight:700;cursor:pointer;border:none;border-radius:16px;padding:14px 22px;font-size:1.05rem;transition:transform .1s,box-shadow .1s;line-height:1.25;}
.btn:active{transform:translateY(3px);}
.btn-gold{background:linear-gradient(135deg,#f8f0c0,#f0d060);color:#5c2810;box-shadow:0 5px 0 #a07820;}
.btn-gold:active{box-shadow:0 2px 0 #a07820;}
.btn-purple{background:linear-gradient(135deg,#ede0f8,#c8a0e0);color:#2a1845;box-shadow:0 5px 0 #6840a0;}
.btn-purple:active{box-shadow:0 2px 0 #6840a0;}
.btn-ghost{background:rgba(30,18,53,.55);color:rgba(220,200,240,.92);border:1px solid rgba(144,96,192,.45);box-shadow:none;}
.jp{font-family:'Zen Maru Gothic','Kosugi Maru',sans-serif;}
#screen-title{justify-content:center;gap:4px;}
.logo-img{max-width:90%;max-height:clamp(90px,18vh,150px);object-fit:contain;filter:drop-shadow(0 4px 20px rgba(167,139,250,.55));}
.title-sub{color:var(--gold-light);font-weight:700;font-size:.9rem;letter-spacing:.12em;text-shadow:0 0 14px rgba(245,158,11,.4);text-align:center;margin-bottom:2px;}
.title-sub .en{font-size:1.15rem;display:block;letter-spacing:.06em;}
.lumi-title{width:clamp(120px,28vw,170px);margin:6px auto 8px;display:block;filter:drop-shadow(0 6px 18px rgba(0,0,0,.45));animation:floaty 3.2s ease-in-out infinite;}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-12px) rotate(1deg)}}
.diff-label{color:var(--purple-light);font-weight:700;font-size:.8rem;letter-spacing:.1em;margin:4px 0 8px;text-transform:uppercase;}
.diff-row{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
.diff-btn{border-radius:15px;border:2.5px solid;padding:11px 16px;cursor:pointer;text-align:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:1rem;line-height:1.2;transition:transform .1s,box-shadow .1s,outline .1s;min-width:92px;}
.diff-btn:active{transform:translateY(3px);}
.diff-btn .djp{display:block;font-family:'Zen Maru Gothic','Kosugi Maru',sans-serif;font-size:.7rem;font-weight:500;opacity:.85;margin-top:2px;}
.diff-btn.easy{background:#d0e8b0;border-color:#4a9040;color:#1a3810;box-shadow:0 4px 0 #3a7030;}
.diff-btn.normal{background:linear-gradient(135deg,#f8f0c0,#f0d060);border-color:#c9a030;color:#5c2810;box-shadow:0 4px 0 #a07820;}
.diff-btn.hard{background:linear-gradient(135deg,#f8ddd0,#f0b8a0);border-color:#c83030;color:#5c1010;box-shadow:0 4px 0 #a02020;}
.diff-btn.sel{outline:3px solid var(--gold-light);outline-offset:3px;transform:translateY(2px);}
.title-actions{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;max-width:300px;}
#screen-intro{justify-content:flex-end;padding-bottom:clamp(20px,5vh,40px);}
.intro-lumi{width:min(58%,240px);margin:auto auto 0;display:block;filter:drop-shadow(0 8px 22px rgba(0,0,0,.5));animation:floaty 3.4s ease-in-out infinite;}
.dialog-box{width:100%;max-width:480px;background:linear-gradient(150deg,#fbf6ea,#f1e6cf);border:3px solid var(--gold);border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,.5),inset 0 2px 0 rgba(255,255,255,.7);padding:18px 20px 16px;position:relative;margin-top:14px;}
.dialog-name{position:absolute;top:-15px;left:18px;background:linear-gradient(135deg,#9060c0,#6840a0);color:#fff;font-weight:700;font-size:.9rem;padding:4px 16px;border-radius:50px;border:2px solid var(--gold-light);box-shadow:0 3px 10px rgba(0,0,0,.3);}
.dialog-en{font-size:1.1rem;font-weight:600;color:var(--text-dark);line-height:1.5;min-height:1.5em;}
.dialog-jp{font-family:'Zen Maru Gothic','Kosugi Maru',sans-serif;font-size:.92rem;color:var(--text-soft);margin-top:8px;line-height:1.6;min-height:1.6em;}
.dialog-next{position:absolute;bottom:10px;right:16px;color:var(--purple);font-size:1.2rem;animation:bobArrow 1s ease-in-out infinite;}
@keyframes bobArrow{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
.intro-skip{position:absolute;top:16px;right:16px;z-index:5;}
#screen-play{padding:0;}
.hud{width:100%;padding:10px 14px 8px;z-index:6;background:linear-gradient(180deg,rgba(21,13,40,.96),rgba(21,13,40,.55) 80%,transparent);}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hud-gauge-label{font-weight:700;font-size:.62rem;letter-spacing:.1em;color:var(--gold-light);text-transform:uppercase;display:flex;gap:5px;align-items:baseline;}
.hud-gauge-label .jp{font-size:.58rem;color:var(--purple-light);}
.hud-right{display:flex;gap:12px;align-items:center;}
.hud-timer{font-weight:700;font-size:1.1rem;color:#fff;font-variant-numeric:tabular-nums;}
.hud-timer.low{color:#ff8080;animation:pulseRed .5s ease-in-out infinite;}
@keyframes pulseRed{0%,100%{opacity:1}50%{opacity:.45}}
.hud-combo{font-weight:700;font-size:.95rem;color:var(--gold-light);min-width:54px;text-align:right;}
.gauge-track{height:22px;background:rgba(0,0,0,.35);border-radius:50px;overflow:hidden;border:1.5px solid rgba(167,139,250,.35);box-shadow:inset 0 2px 6px rgba(0,0,0,.4);position:relative;}
.gauge-fill{height:100%;width:0%;border-radius:50px;background:linear-gradient(90deg,#7c3aed,#c084fc);transition:width .3s cubic-bezier(.34,1.56,.64,1),background .5s;position:relative;}
.gauge-fill::after{content:'';position:absolute;top:2px;left:6px;right:6px;height:35%;background:rgba(255,255,255,.3);border-radius:50px;}
.gauge-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:700;font-size:.76rem;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);z-index:2;}
.battle{position:relative;flex:1;width:100%;overflow:hidden;display:flex;flex-direction:column;}
.cracks{position:absolute;inset:0;pointer-events:none;z-index:1;transition:opacity .6s;}
.danger-vignette{position:absolute;inset:0;pointer-events:none;z-index:2;box-shadow:inset 0 0 90px 18px rgba(200,40,40,0);transition:box-shadow .22s;}
.beatflash{position:absolute;inset:0;pointer-events:none;z-index:2;background:radial-gradient(circle at 50% 42%,rgba(200,160,224,.16),transparent 60%);opacity:0;}
.beatflash.on{animation:bf .5s ease-out;}
@keyframes bf{0%{opacity:.7}100%{opacity:0}}
.lumi-fighter{position:absolute;left:1%;bottom:3%;width:30%;max-width:150px;z-index:4;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5));animation:idleBob 1.06s ease-in-out infinite;transform-origin:bottom center;}
@keyframes idleBob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.01)}}
.lumi-fighter.cast{animation:castPulse .3s ease;}
@keyframes castPulse{0%{transform:scale(1)}40%{transform:scale(1.1) rotate(-3deg) translateY(-4px)}100%{transform:scale(1)}}
.arena{position:relative;z-index:3;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 14px 14px;}
.q-ring-wrap{position:relative;width:clamp(120px,34vw,168px);height:clamp(120px,34vw,168px);display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.target-ring{position:absolute;width:100%;height:100%;border-radius:50%;border:3px solid rgba(240,208,96,.55);box-shadow:0 0 22px rgba(240,208,96,.25),inset 0 0 16px rgba(240,208,96,.12);}
.target-ring.beat{animation:tBeat .5s ease-out;}
@keyframes tBeat{0%{box-shadow:0 0 38px rgba(240,208,96,.6),inset 0 0 22px rgba(240,208,96,.3)}100%{box-shadow:0 0 22px rgba(240,208,96,.25),inset 0 0 16px rgba(240,208,96,.12)}}
.approach-ring{position:absolute;width:100%;height:100%;border-radius:50%;border:4px solid var(--purple-light);box-shadow:0 0 18px rgba(200,160,224,.5);will-change:transform;}
.q-emoji{font-size:clamp(2.6rem,11vw,3.8rem);line-height:1;z-index:2;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));}
.q-word{font-family:'Fredoka',sans-serif;font-size:clamp(1.7rem,8vw,2.4rem);font-weight:700;letter-spacing:4px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.6);margin-top:6px;}
.q-word .blank{color:var(--gold-light);}
.q-meta{font-family:'Zen Maru Gothic','Kosugi Maru',sans-serif;font-weight:700;color:var(--purple-light);font-size:.92rem;margin-top:1px;text-align:center;}
.q-meta small{display:block;color:rgba(200,160,224,.7);font-size:.74rem;}
.q-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:420px;margin-top:14px;}
.q-opt{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.4rem,7vw,2rem);padding:14px 2px;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#ede0f8,#cbb3ec);color:#2a1845;border:2px solid var(--purple);box-shadow:0 4px 0 #6840a0;transition:transform .07s,box-shadow .07s;}
.q-opt:active{transform:translateY(3px);box-shadow:0 1px 0 #6840a0;}
.q-opt.correct{background:linear-gradient(135deg,#d0e8b0,#aed47e);border-color:#4a9040;box-shadow:0 4px 0 #3a7030;color:#1a3810;}
.q-opt.wrong{background:linear-gradient(135deg,#f8ddd0,#f0b0a0);border-color:#c83030;box-shadow:0 4px 0 #a02020;color:#5c1010;}
.q-opt.dim{opacity:.4;}
.judge{position:absolute;left:50%;top:18%;transform:translate(-50%,-50%);z-index:7;font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.9rem;pointer-events:none;opacity:0;text-shadow:0 2px 10px rgba(0,0,0,.6);}
.judge.show{animation:judgePop .6s ease-out;}
@keyframes judgePop{0%{opacity:0;transform:translate(-50%,-20%) scale(.5)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-90%) scale(1)}}
.blast{position:absolute;z-index:5;font-size:1.6rem;pointer-events:none;}
@keyframes blastFly{0%{opacity:1;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(1.5)}}
.go-overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(21,13,40,.62);}
.go-text{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(2.4rem,12vw,3.6rem);color:var(--gold-light);text-shadow:0 0 30px rgba(240,208,96,.7),0 4px 8px rgba(0,0,0,.5);}
.go-text.pop{animation:goPop .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes goPop{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}
#screen-result{justify-content:center;gap:5px;text-align:center;}
.result-lumi{width:min(44%,180px);margin:0 auto 4px;display:block;filter:drop-shadow(0 8px 22px rgba(0,0,0,.5));}
.result-lumi.sad{filter:drop-shadow(0 8px 22px rgba(0,0,0,.5)) grayscale(.55) brightness(.85);}
.result-title{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(2rem,9vw,2.6rem);line-height:1;text-shadow:0 0 30px currentColor,0 3px 6px rgba(0,0,0,.5);}
.result-title.win{color:var(--gold-light);}
.result-title.lose{color:var(--purple-light);}
.result-jp{font-family:'Zen Maru Gothic','Kosugi Maru',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;}
.result-msg{color:var(--purple-light);font-size:.92rem;max-width:340px;line-height:1.45;margin:2px auto 4px;}
.result-msg .jp{display:block;font-size:.8rem;color:rgba(200,160,224,.85);margin-top:2px;}
.score-panel{background:rgba(245,238,220,.96);border:2px solid var(--gold);border-radius:18px;padding:12px 20px;margin:6px 0 2px;min-width:240px;box-shadow:0 6px 24px rgba(0,0,0,.4);}
.score-big{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(2.4rem,11vw,3rem);color:var(--purple-dark);line-height:1;}
.score-cap{font-size:.66rem;font-weight:700;letter-spacing:.14em;color:#8a7a6a;text-transform:uppercase;}
.score-stats{display:flex;justify-content:center;gap:14px;margin-top:6px;font-size:.76rem;color:var(--text-soft);font-weight:700;}
.score-stats span b{color:var(--purple-dark);}
.newbest{color:#c98030;font-weight:700;font-size:.85rem;margin-top:4px;animation:pulseRed 1s ease-in-out infinite;}
.result-actions{display:flex;gap:10px;margin-top:8px;}
#screen-scores{justify-content:flex-start;gap:10px;padding-top:clamp(24px,5vh,40px);}
.panel-h{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.6rem;color:var(--gold-light);text-shadow:0 0 18px rgba(240,208,96,.5);text-align:center;}
.panel-h .jp{display:block;font-size:.9rem;color:var(--purple-light);}
.score-tabs{display:flex;gap:8px;margin:4px 0;}
.score-tab{padding:8px 16px;border-radius:50px;border:2px solid;cursor:pointer;font-weight:700;font-size:.85rem;}
.score-tab.easy{border-color:#4a9040;color:#c0e090;}
.score-tab.normal{border-color:#c9a030;color:var(--gold-light);}
.score-tab.hard{border-color:#c83030;color:#f0a090;}
.score-tab.sel{background:rgba(255,255,255,.12);}
.score-list{width:100%;max-width:380px;background:rgba(245,238,220,.95);border:2px solid rgba(201,160,48,.5);border-radius:18px;overflow:hidden;}
.score-item{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid rgba(144,96,192,.15);}
.score-item:last-child{border-bottom:none;}
.score-rank{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.2rem;color:var(--purple);width:30px;}
.score-rank.gold{color:#c98030;}
.score-val{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.25rem;color:var(--purple-dark);margin-left:auto;}
.score-empty{padding:24px;text-align:center;color:#8a7a6a;font-weight:700;font-size:.9rem;}
.shake{animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-4px,-2px)}80%{transform:translate(4px,2px)}}
</style>
</head>
<body>
<div class="stage-wrap" id="stage">
  <div class="starfield" id="stars"></div>

  <section class="screen active" id="screen-title">
    <img class="logo-img" id="title-logo" alt="Hero's Proof">
    <div class="title-sub"><span class="en">Magic Resonance</span><span class="jp">ルミの魔法レゾナンス</span></div>
    <img class="lumi-title" id="title-lumi" alt="Lumi">
    <div class="diff-label">Choose difficulty / なんいど</div>
    <div class="diff-row">
      <div class="diff-btn easy" data-diff="easy" onclick="selDiff('easy')">EASY<span class="djp">かんたん</span></div>
      <div class="diff-btn normal sel" data-diff="normal" onclick="selDiff('normal')">NORMAL<span class="djp">ふつう</span></div>
      <div class="diff-btn hard" data-diff="hard" onclick="selDiff('hard')">HARD<span class="djp">むずかしい</span></div>
    </div>
    <div class="title-actions">
      <button class="btn btn-gold" style="font-size:1.2rem;padding:16px 30px;" onclick="startGame()">▶ START / はじめる</button>
      <button class="btn btn-ghost" onclick="showScores()">🏆 High Scores / スコア</button>
    </div>
  </section>

  <section class="screen" id="screen-scores">
    <div class="panel-h">🏆 High Scores<span class="jp">ハイスコア</span></div>
    <div class="score-tabs">
      <div class="score-tab easy" data-st="easy" onclick="showScoreList('easy')">EASY</div>
      <div class="score-tab normal sel" data-st="normal" onclick="showScoreList('normal')">NORMAL</div>
      <div class="score-tab hard" data-st="hard" onclick="showScoreList('hard')">HARD</div>
    </div>
    <div class="score-list" id="score-list"></div>
    <button class="btn btn-ghost" style="margin-top:8px;" onclick="showScreen('screen-title')">↩ Back / もどる</button>
  </section>

  <section class="screen" id="screen-intro">
    <button class="btn btn-ghost intro-skip" onclick="skipIntro()">Skip ⏭ / スキップ</button>
    <img class="intro-lumi" id="intro-lumi" alt="Lumi">
    <div class="dialog-box" onclick="advanceDialog()">
      <div class="dialog-name">Lumi / ルミ</div>
      <div class="dialog-en" id="dialog-en"></div>
      <div class="dialog-jp" id="dialog-jp"></div>
      <div class="dialog-next" id="dialog-next">▼</div>
    </div>
  </section>

  <section class="screen" id="screen-play">
    <div class="hud">
      <div class="hud-top">
        <div class="hud-gauge-label">⚔️ Magic Gauge <span class="jp">魔法ゲージ</span></div>
        <div class="hud-right">
          <div class="hud-combo" id="hud-combo"></div>
          <div class="hud-timer" id="hud-timer">1:40</div>
        </div>
      </div>
      <div class="gauge-track"><div class="gauge-fill" id="gauge-fill"></div><div class="gauge-pct" id="gauge-pct">0%</div></div>
    </div>
    <div class="battle" id="battle">
      <svg class="cracks" id="cracks" viewBox="0 0 400 400" preserveAspectRatio="none">
        <g stroke="#1a0d2e" stroke-width="2.5" fill="none" opacity="0.9" stroke-linecap="round">
          <path d="M0,80 L70,120 L60,180 L130,210 L110,280 L190,300"/>
          <path d="M400,60 L330,110 L350,170 L280,200 L300,260 L230,290"/>
          <path d="M150,0 L160,60 L120,100 L150,150"/>
          <path d="M260,0 L250,70 L290,110 L260,160"/>
          <path d="M0,330 L80,340 L120,400"/>
          <path d="M400,330 L320,350 L290,400"/>
        </g>
      </svg>
      <div class="danger-vignette" id="vignette"></div>
      <div class="beatflash" id="beatflash"></div>
      <img class="lumi-fighter" id="lumi-fighter" alt="Lumi">
      <div class="judge" id="judge"></div>
      <div class="arena">
        <div class="q-ring-wrap">
          <div class="target-ring" id="target-ring"></div>
          <div class="approach-ring" id="approach-ring"></div>
          <div class="q-emoji" id="q-emoji">🍎</div>
        </div>
        <div class="q-word" id="q-word"></div>
        <div class="q-meta" id="q-meta"></div>
        <div class="q-opts" id="q-opts"></div>
      </div>
      <div class="go-overlay" id="go-overlay"><div class="go-text" id="go-text">Ready?</div></div>
    </div>
  </section>

  <section class="screen" id="screen-result">
    <img class="result-lumi" id="result-lumi" alt="Lumi">
    <div class="result-title" id="result-title">VICTORY!</div>
    <div class="result-jp" id="result-jp"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="score-panel">
      <div class="score-cap">Score / スコア</div>

  if(audioStarted)return; audioStarted=true;
  const c=ctx(); if(c&&c.state==='suspended')c.resume();
  if(decoded&&c){try{srcNode=c.createBufferSource();srcNode.buffer=buf;srcNode.loop=true;srcNode.loopStart=0;srcNode.loopEnd=LOOP_END;srcNode.connect(c.destination);srcNode.start();return;}catch(e){}}
  try{bgm.currentTime=0;bgm.loop=true;const p=bgm.play();if(p&&p.catch)p.catch(()=>{});}catch(e){}
}
function stopMusic(){try{srcNode&&srcNode.stop();}catch(e){}srcNode=null;try{bgm.pause();}catch(e){}audioStarted=false;}
function tone(f,type,dur,vol,delay=0,f2=null){try{const c=ctx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(f,c.currentTime+delay);if(f2)o.frequency.exponentialRampToValueAtTime(f2,c.currentTime+delay+dur);g.gain.setValueAtTime(0,c.currentTime+delay);g.gain.linearRampToValueAtTime(vol,c.currentTime+delay+.012);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+delay+dur);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur+.05);}catch(e){}}
const sfxTap=()=>tone(520,'sine',.06,.1);
const sfxPerfect=()=>{tone(880,'sine',.1,.16);tone(1320,'sine',.12,.12,.06);tone(1760,'sine',.1,.08,.12);};
const sfxGood=()=>{tone(660,'sine',.1,.13);tone(990,'sine',.1,.08,.05);};
const sfxWrong=()=>{tone(300,'sawtooth',.18,.12,0,150);tone(150,'triangle',.28,.1,.1);};
const sfxMiss=()=>tone(200,'triangle',.16,.1,0,120);
const sfxWin=()=>{[523,659,784,659,1047,1319,1568].forEach((f,i)=>tone(f,'sine',i===6?.6:.16,.2,i*.12));};
const sfxLose=()=>{[440,392,330,262].forEach((f,i)=>tone(f,'triangle',.3,.15,i*.18));};
const sfxGo=()=>{tone(660,'square',.12,.13);tone(990,'square',.2,.13,.12);};

let cfg, diffKey='normal';
let gauge=0, score=0, combo=0, maxCombo=0, qTotal=0, qRight=0, perfects=0, misses=0;
let playing=false, accepting=false, locked=false;
let clockStart=0, songTime=0, rafId=null;
let pool=[], cur=null, qStart=0, qDeadline=0, lastBeat=-1;

function selDiff(d){diffKey=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('sel',b.dataset.diff===d));sfxTap();}

const DIALOG=[
  {en:"Oh! A hero from another world! You came! ✨",jp:"あっ！べつの世界の勇者さん！来てくれたんだね！"},
  {en:"I'm Lumi. I... kind of broke my world during magic class. 💦",jp:"わたしはルミ。えっと…魔法のじゅぎょう中に、せかいをこわしちゃって…💦"},
  {en:"Quick! Answers will fly at you to the beat of my song!",jp:"急いで！わたしの歌のビートに合わせて、こたえがどんどん出てくるよ！"},
  {en:"Tap the right first letter before the ring closes in!",jp:"リングが閉じる前に、正しいさいしょの文字をタップ！"},
  {en:"Fill the Magic Gauge before time runs out. Ready?",jp:"時間内に魔法ゲージをいっぱいにしてね。じゅんびはいい？"},
];
let di=0,typing=false,tt=null;
function startIntro(){di=0;showScreen('screen-intro');renderDialog();}
function renderDialog(){const d=DIALOG[di],e=document.getElementById('dialog-en'),j=document.getElementById('dialog-jp');document.getElementById('dialog-next').style.display='none';e.textContent='';j.textContent='';typing=true;let i=0;clearInterval(tt);tt=setInterval(()=>{if(i<d.en.length){e.textContent+=d.en[i];if(d.en[i]!==' ')sfxTap();i++;}else{clearInterval(tt);j.textContent=d.jp;typing=false;document.getElementById('dialog-next').style.display='block';}},26);}
function advanceDialog(){if(typing){clearInterval(tt);typing=false;document.getElementById('dialog-en').textContent=DIALOG[di].en;document.getElementById('dialog-jp').textContent=DIALOG[di].jp;document.getElementById('dialog-next').style.display='block';return;}di++;if(di>=DIALOG.length)beginCountdown();else renderDialog();}
function skipIntro(){clearInterval(tt);beginCountdown();}

function startGame(){cfg=DIFF[diffKey];ctx();if(actx&&actx.state==='suspended')actx.resume();preloadAudio();startIntro();}
function beginCountdown(){
  gauge=0;score=0;combo=0;maxCombo=0;qTotal=0;qRight=0;perfects=0;misses=0;
  playing=false;accepting=false;locked=false;lastBeat=-1;
  pool=shuffle(QUESTIONS.slice());
  updateGauge();document.getElementById('hud-combo').textContent='';
  document.getElementById('cracks').style.opacity='0.9';
  showScreen('screen-play');
  startMusicGesture();
  const go=document.getElementById('go-overlay'),gt=document.getElementById('go-text');
  go.style.display='flex';gt.textContent='Ready?';gt.className='go-text pop';void gt.offsetWidth;gt.classList.add('pop');sfxGo();
  setTimeout(()=>{gt.textContent='Go! ✨';gt.classList.remove('pop');void gt.offsetWidth;gt.classList.add('pop');sfxGo();},1100);
  setTimeout(()=>{go.style.display='none';launchPlay();},2100);
}
function launchPlay(){playing=true;clockStart=performance.now();nextQuestion(cfg.lead);loopGame();}

function loopGame(){
  if(!playing)return;
  songTime=(performance.now()-clockStart)/1000;
  const remain=Math.max(0,TIME_LIMIT-songTime);
  document.getElementById('hud-timer').textContent=Math.floor(remain/60)+':'+String(Math.floor(remain%60)).padStart(2,'0');
  document.getElementById('hud-timer').classList.toggle('low',remain<=15);
  const b=Math.floor((songTime-FIRST_BEAT)/BEAT);
  if(b!==lastBeat){lastBeat=b;pulseBeat();}
  if(cur&&accepting){
    const prog=(songTime-qStart)/(qDeadline-qStart);
    const ar=document.getElementById('approach-ring');
    const scale=Math.max(1,2.6-1.6*Math.min(prog,1));
    ar.style.transform=`scale(${scale})`;
    ar.style.opacity=(0.35+0.65*Math.min(prog,1)).toFixed(2);
    if(prog>=1.06)timeoutMiss();
  }
  if(gauge>=WIN_GAUGE){endGame(true);return;}
  if(songTime>=TIME_LIMIT){endGame(false);return;}
  rafId=requestAnimationFrame(loopGame);
}
function pulseBeat(){const t=document.getElementById('target-ring');t.classList.remove('beat');void t.offsetWidth;t.classList.add('beat');const f=document.getElementById('beatflash');f.classList.remove('on');void f.offsetWidth;f.classList.add('on');}

function snapBeat(t){return FIRST_BEAT+Math.ceil((t-FIRST_BEAT)/BEAT)*BEAT;}
function nextQuestion(leadBeats){
  if(pool.length===0)pool=shuffle(QUESTIONS.slice());
  cur=pool.pop();
  qStart=snapBeat(songTime+0.04);
  qDeadline=qStart+(cfg.Wbeats+(leadBeats||0))*BEAT;
  document.getElementById('q-emoji').textContent=cur.emoji;
  document.getElementById('q-word').innerHTML='<span class="blank">_</span>'+cur.word.slice(1);
  document.getElementById('q-meta').innerHTML=cur.kata+'<small>'+cur.jp+'</small>';
  const opts=shuffle(cur.opts.slice());
  const box=document.getElementById('q-opts');box.innerHTML='';
  opts.forEach(o=>{const el=document.createElement('div');el.className='q-opt';el.textContent=o;el.onclick=()=>answer(el,o);box.appendChild(el);});
  const ar=document.getElementById('approach-ring');ar.style.transform='scale(2.6)';ar.style.opacity='.35';
  accepting=true;locked=false;qTotal++;
}
function answer(btn,chosen){
  if(!accepting||locked)return;locked=true;accepting=false;
  const correct=cur.ans;
  const prog=(songTime-qStart)/(qDeadline-qStart);
  const onBeat=prog>=0.62;
  if(chosen===correct){
    qRight++;combo++;maxCombo=Math.max(maxCombo,combo);
    if(onBeat){perfects++;addGauge(cfg.gPerfect);score+=Math.round(120*(1+combo*0.03));sfxPerfect();flashJudge('PERFECT! ✨','#f0d060');}
    else{addGauge(cfg.gGood);score+=Math.round(70*(1+combo*0.03));sfxGood();flashJudge('GOOD!','#9fd0f0');}
    btn.classList.add('correct');castLumi();blast();
    if(combo&&combo%10===0){addGauge(2);flashJudge(combo+' COMBO! 🔥','#c8a0e0');}
    updateCombo();setTimeout(()=>nextQuestion(0),360);
  }else{
    misses++;combo=0;addGauge(cfg.gWrong);sfxWrong();flashDanger();shake();flashJudge('Miss…','#f0a090');
    btn.classList.add('wrong');
    document.querySelectorAll('.q-opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');else if(!b.classList.contains('wrong'))b.classList.add('dim');});
    updateCombo();setTimeout(()=>nextQuestion(0),900);
  }
}
function timeoutMiss(){
  if(!accepting||locked)return;locked=true;accepting=false;
  misses++;combo=0;addGauge(cfg.gMiss);sfxMiss();flashDanger();flashJudge('Too slow!','#f0a090');
  document.querySelectorAll('.q-opt').forEach(b=>{if(b.textContent===cur.ans)b.classList.add('correct');else b.classList.add('dim');});
  updateCombo();setTimeout(()=>nextQuestion(0),850);
}

function castLumi(){const l=document.getElementById('lumi-fighter');l.classList.remove('cast');void l.offsetWidth;l.classList.add('cast');}
function blast(){const b=document.getElementById('battle');const e=document.createElement('div');e.className='blast';e.textContent=['✨','💜','⭐','🌟'][(Math.random()*4)|0];e.style.left='14%';e.style.bottom='14%';e.style.setProperty('--bx',(40+Math.random()*40)+'vw');e.style.setProperty('--by',-(20+Math.random()*30)+'vh');e.style.animation='blastFly .6s ease-out forwards';b.appendChild(e);setTimeout(()=>e.remove(),650);}
function flashJudge(txt,col){const j=document.getElementById('judge');j.textContent=txt;j.style.color=col;j.classList.remove('show');void j.offsetWidth;j.classList.add('show');}
function flashDanger(){const v=document.getElementById('vignette');v.style.boxShadow='inset 0 0 90px 18px rgba(200,40,40,.55)';setTimeout(()=>v.style.boxShadow='inset 0 0 90px 18px rgba(200,40,40,0)',200);}
function shake(){const s=document.getElementById('stage');s.classList.remove('shake');void s.offsetWidth;s.classList.add('shake');}
function updateCombo(){document.getElementById('hud-combo').textContent=combo>=3?'🔥'+combo:'';}

function addGauge(v){gauge=Math.max(0,Math.min(WIN_GAUGE,gauge+v));updateGauge();document.getElementById('cracks').style.opacity=(0.9*(1-gauge/WIN_GAUGE)+0.05).toFixed(2);}
function updateGauge(){const f=document.getElementById('gauge-fill'),p=document.getElementById('gauge-pct');f.style.width=gauge+'%';if(gauge>=80)f.style.background='linear-gradient(90deg,#d97706,#fde68a)';else if(gauge>=50)f.style.background='linear-gradient(90deg,#9333ea,#f0d060)';else f.style.background='linear-gradient(90deg,#7c3aed,#c084fc)';p.textContent=Math.round(gauge)+'%';}

function endGame(won){
  playing=false;accepting=false;cancelAnimationFrame(rafId);stopMusic();
  if(won)score+=Math.floor(Math.max(0,TIME_LIMIT-songTime))*15;
  score+=Math.round(gauge*4);score=Math.max(0,Math.round(score));
  const isBest=saveScore(diffKey,score);
  const lumi=document.getElementById('result-lumi'),title=document.getElementById('result-title'),jp=document.getElementById('result-jp'),msg=document.getElementById('result-msg');
  if(won){lumi.className='result-lumi';title.textContent='VICTORY! ✨';title.className='result-title win';jp.textContent='世界が救われた！💜';msg.innerHTML="Lumi's world is whole again. Thank you, hero!<span class='jp'>ルミの世界が元にもどったよ。ありがとう、勇者さん！</span>";sfxWin();}
  else{lumi.className='result-lumi sad';title.textContent="Time's Up…";title.className='result-title lose';jp.textContent='時間切れ…💔';msg.innerHTML="The cracks are still spreading. Try once more!<span class='jp'>まだひびが広がってる…。もう一回ちょうせんしよう！</span>";sfxLose();}
  document.getElementById('result-score').textContent=score.toLocaleString();
  document.getElementById('result-stats').innerHTML=`<span>✅ <b>${qRight}</b>/${qTotal}</span><span>🎯 <b>${perfects}</b> perfect</span><span>🔥 <b>${maxCombo}</b> combo</span>`;
  document.getElementById('result-newbest').style.display=isBest?'block':'none';
  showScreen('screen-result');
}
function goTitle(){stopMusic();showScreen('screen-title');}

function sKey(d){return 'lumiRhythm2_'+d;}
function getScores(d){try{return JSON.parse(Store.get(sKey(d))||'[]');}catch(e){return[];}}
function saveScore(d,sc){const l=getScores(d);l.push(sc);l.sort((a,b)=>b-a);const top=l.slice(0,5);Store.set(sKey(d),JSON.stringify(top));return sc>0&&top[0]===sc&&l.indexOf(sc)===0;}
let sTab='normal';
function showScores(){sTab=diffKey;showScreen('screen-scores');showScoreList(diffKey);}
function showScoreList(d){sTab=d;document.querySelectorAll('.score-tab').forEach(t=>t.classList.toggle('sel',t.dataset.st===d));const l=getScores(d),box=document.getElementById('score-list');if(!l.length){box.innerHTML='<div class="score-empty">No scores yet!<br>まだスコアがないよ</div>';return;}box.innerHTML=l.map((sc,i)=>`<div class="score-item"><div class="score-rank ${i===0?'gold':''}">${i===0?'👑':'#'+(i+1)}</div><div class="score-val">${sc.toLocaleString()}</div></div>`).join('');sfxTap();}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
</script>
